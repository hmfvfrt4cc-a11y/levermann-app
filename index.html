const BATCH_DELAY_MS  = 1200; // Pause zwischen Batches

// ── Levermann Scoring Engine ───────────────────────────────────────
function calcScore(d, sector) {
  const isFin = FINANCE_SECTORS.includes(sector);
  const ok = v => v !== null && v !== undefined && isFinite(v);
  const crit = [];
  function sc(id,name,val,disp,reason){ crit.push({id,name,score:val,value:disp,reasoning:reason}); }

  const roe=d.roe, em=d.ebitMargin, eq=d.equityRatio;
  const pe5=d.pe5yAvg, pe=d.pe, buy=d.analystBuyPct;
  const qr=d.earningsReactionPct, p6=d.perf6m, p12=d.perf12m;
  const eg=d.epsGrowthYoY, up=d.analystTargetUpside;

  if(!ok(roe))         sc(1,"EK-Rendite",0,"n/v","Keine Daten");
  else if(roe>0.20)    sc(1,"EK-Rendite",1,(roe*100).toFixed(1)+"%",">20%");
  else if(roe>=0.10)   sc(1,"EK-Rendite",0,(roe*100).toFixed(1)+"%","10-20%");
  else                 sc(1,"EK-Rendite",-1,(roe*100).toFixed(1)+"%","<10%");

  if(isFin)            sc(2,"EBIT-Marge",0,"n/a","Finanzsektor");
  else if(!ok(em))     sc(2,"EBIT-Marge",0,"n/v","Keine Daten");
  else if(em>0.12)     sc(2,"EBIT-Marge",1,(em*100).toFixed(1)+"%",">12%");
  else if(em>=0.06)    sc(2,"EBIT-Marge",0,(em*100).toFixed(1)+"%","6-12%");
  else                 sc(2,"EBIT-Marge",-1,(em*100).toFixed(1)+"%","<6%");

  if(!ok(eq))          sc(3,"EK-Quote",0,"n/v","Keine Daten");
  else if(isFin){
    if(eq>0.10)        sc(3,"EK-Quote",1,(eq*100).toFixed(1)+"%",">10% (Bank)");
    else if(eq>=0.05)  sc(3,"EK-Quote",0,(eq*100).toFixed(1)+"%","5-10% (Bank)");
    else               sc(3,"EK-Quote",-1,(eq*100).toFixed(1)+"%","<5% (Bank)");
  } else {
    if(eq>0.25)        sc(3,"EK-Quote",1,(eq*100).toFixed(1)+"%",">25%");
    else if(eq>=0.15)  sc(3,"EK-Quote",0,(eq*100).toFixed(1)+"%","15-25%");
    else               sc(3,"EK-Quote",-1,(eq*100).toFixed(1)+"%","<15%");
  }

  if(!ok(pe5)||pe5<=0) sc(4,"KGV 5 Jahre",0,"n/v","Keine Daten");
  else if(pe5<12)      sc(4,"KGV 5 Jahre",1,pe5.toFixed(1),"<12");
  else if(pe5<=16)     sc(4,"KGV 5 Jahre",0,pe5.toFixed(1),"12-16");
  else                 sc(4,"KGV 5 Jahre",-1,pe5.toFixed(1),">16");

  if(!ok(pe)||pe<=0)   sc(5,"KGV aktuell",0,"n/v","Keine Daten");
  else if(pe<12)       sc(5,"KGV aktuell",1,pe.toFixed(1),"<12");
  else if(pe<=16)      sc(5,"KGV aktuell",0,pe.toFixed(1),"12-16");
  else                 sc(5,"KGV aktuell",-1,pe.toFixed(1),">16");

  if(!ok(buy))         sc(6,"Analysten",0,"n/v","Keine Daten");
  else if(buy>70)      sc(6,"Analysten",-1,buy.toFixed(0)+"%","Kontra: >70% bullisch");
  else if(buy>=50)     sc(6,"Analysten",0,buy.toFixed(0)+"%","Gemischt");
  else                 sc(6,"Analysten",1,buy.toFixed(0)+"%","Kontra: bearisch");

  if(!ok(qr))          sc(7,"Quartalsreaktion",0,"n/v","Keine Daten");
  else if(qr>1)        sc(7,"Quartalsreaktion",1,qr.toFixed(1)+"%","Positiv");
  else if(qr>=-1)      sc(7,"Quartalsreaktion",0,qr.toFixed(1)+"%","Neutral");
  else                 sc(7,"Quartalsreaktion",-1,qr.toFixed(1)+"%","Negativ");

  sc(8,"Gewinnrevision",0,"n/v","Nur Finnhub-Modus");

  if(!ok(p6))          sc(9,"Kurs 6M",0,"n/v","Keine Daten");
  else if(p6>5)        sc(9,"Kurs 6M",1,(p6>0?"+":"")+p6.toFixed(1)+"%","Stark");
  else if(p6>=-5)      sc(9,"Kurs 6M",0,(p6>0?"+":"")+p6.toFixed(1)+"%","Seitwaerts");
  else                 sc(9,"Kurs 6M",-1,p6.toFixed(1)+"%","Schwach");

  if(!ok(p12))         sc(10,"Kurs 1J",0,"n/v","Keine Daten");
  else if(p12>5)       sc(10,"Kurs 1J",1,(p12>0?"+":"")+p12.toFixed(1)+"%","Stark");
  else if(p12>=-5)     sc(10,"Kurs 1J",0,(p12>0?"+":"")+p12.toFixed(1)+"%","Seitwaerts");
  else                 sc(10,"Kurs 1J",-1,p12.toFixed(1)+"%","Schwach");

  if(!ok(p6)||!ok(p12)) sc(11,"Momentum",0,"n/v","Keine Daten");
  else if(p6>p12)       sc(11,"Momentum",1,"6M>1J","Beschleunigend");
  else                  sc(11,"Momentum",-1,"6M<=1J","Abbremsend");

  if(!ok(eg))          sc(12,"Gewinnwachstum",0,"n/v","Keine Daten");
  else if(eg>0)        sc(12,"Gewinnwachstum",1,(eg>0?"+":"")+eg.toFixed(1)+"%","Wachstum");
  else if(eg===0)      sc(12,"Gewinnwachstum",0,"0%","Unveraendert");
  else                 sc(12,"Gewinnwachstum",-1,eg.toFixed(1)+"%","Rueckgang");

  if(!ok(up))          sc(13,"Kurspotenzial",0,"n/v","Keine Daten");
  else if(up>15)       sc(13,"Kurspotenzial",1,(up>0?"+":"")+up.toFixed(1)+"%",">15%");
  else if(up>=0)       sc(13,"Kurspotenzial",0,(up>0?"+":"")+up.toFixed(1)+"%","0-15%");
  else                 sc(13,"Kurspotenzial",-1,up.toFixed(1)+"%","Negativ");

  const total = crit.reduce((s,c)=>s+c.score,0);
  const rec   = total>=4?"KAUFEN":total<=2?"VERKAUFEN":"HALTEN";
  const comp  = Math.round(crit.filter(c=>c.value!=="n/v"&&c.value!=="n/a").length/13*100);
  return {criteria:crit,totalScore:total,recommendation:rec,dataCompleteness:comp};
}

// ── Finnhub Direct Client ──────────────────────────────────────────
// Works in deployed PWA — no sandbox. Finnhub CORS is enabled.
const FH_CACHE = new Map();

async function fhGet(path, key) {
  const url = "https://finnhub.io/api/v1/"+path+"&token="+key;
  const hit = FH_CACHE.get(url);
  if(hit && Date.now()-hit.ts < CACHE_TTL_MS) return hit.data;

  // Explicit CORS mode — required for iOS PWA standalone
  let resp;
  try {
    resp = await fetch(url, { method:"GET", mode:"cors", credentials:"omit",
      headers:{"Accept":"application/json"} });
  } catch(netErr) {
    // "Load failed" arrives here — give a clear message
    throw new Error("Netzwerk: "+netErr.message+" — CORS oder Verbindung. Key korrekt?");
  }

  if(resp.status===401||resp.status===403)
    throw new Error("API Key ungueltig ("+resp.status+") — Key auf finnhub.io pruefen");
  if(resp.status===429)
    throw new Error("Rate Limit (429) — 60 Sek. warten, dann erneut starten");
  if(!resp.ok) throw new Error("Finnhub HTTP "+resp.status);

  // Safely read text first — resp.json() wirft in Safari "pattern" error bei leerem Body
  let text;
  try { text = await resp.text(); } catch(e) { throw new Error("Response lesen: "+e.message); }

  if(!text || text.trim()==="") return {}; // leere Antwort = keine Daten, kein Fehler

  let data;
  try { data = JSON.parse(text); } catch(e) {
    throw new Error("JSON Fehler ("+text.slice(0,40)+")");
  }

  // Finnhub gibt {"error":"..."} bei ungueltigem Symbol — kein throw, einfach leeres Objekt
  if(data && data.error) return {};

  FH_CACHE.set(url,{data,ts:Date.now()});
  return data;
}

async function fetchFinnhubStock(stock, key) {
  const t = stock.ticker;
  // Sequential requests — prevents iOS rate-limit and CORS issues
  // that occur with Promise.all on the Finnhub free plan
  const metrics = await fhGet("stock/metric?symbol="+t+"&metric=all",key);
  await new Promise(r=>setTimeout(r,250));
  const recs    = await fhGet("recommendation?symbol="+t,key);
  await new Promise(r=>setTimeout(r,250));
  const quote   = await fhGet("quote?symbol="+t,key);
  await new Promise(r=>setTimeout(r,250));
  const target  = await fhGet("price-target?symbol="+t,key);
  const m = (metrics&&metrics.metric)||{};
  const ok = v => v!==null&&v!==undefined&&isFinite(v)&&v!==0;

  let roe = ok(m.roeTTM)?m.roeTTM/100:null;
  if(roe!==null&&(roe>5||roe<-2)) roe=null;

  let ebitMargin=null;
  if(ok(m.ebitdMarginTTM)) ebitMargin=m.ebitdMarginTTM/100;
  else if(ok(m.netProfitMarginTTM)) ebitMargin=m.netProfitMarginTTM/100;

  let equityRatio=null;
  if(ok(m.totalDebt2TotalEquityAnnual)&&m.totalDebt2TotalEquityAnnual>=0)
    equityRatio=1/(1+m.totalDebt2TotalEquityAnnual);

  let pe=(ok(m.peTTM)&&m.peTTM>0&&m.peTTM<2000)?m.peTTM:null;
  let pe5yAvg=(ok(m.peBasicExclExtraTTM)&&m.peBasicExclExtraTTM>0)?m.peBasicExclExtraTTM:pe;

  let analystBuyPct=null;
  if(Array.isArray(recs)&&recs.length>0){
    const r=recs[0];
    const tot=(r.strongBuy||0)+(r.buy||0)+(r.hold||0)+(r.sell||0)+(r.strongSell||0);
    if(tot>0) analystBuyPct=((r.strongBuy||0)+(r.buy||0))/tot*100;
  }

  const perf6m  = ok(m["26WeekPriceReturnDaily"])?m["26WeekPriceReturnDaily"]:null;
  const perf12m = ok(m["52WeekPriceReturnDaily"])?m["52WeekPriceReturnDaily"]:null;
  const epsGrowthYoY = ok(m.epsGrowthTTMYoy)?m.epsGrowthTTMYoy:null;

  const currentPrice=(quote&&ok(quote.c)&&quote.c>0)?quote.c:null;
  let analystTargetUpside=null;
  if(target&&ok(target.targetMean)&&currentPrice){
    analystTargetUpside=(target.targetMean-currentPrice)/currentPrice*100;
    if(Math.abs(analystTargetUpside)>200) analystTargetUpside=null;
  }

  let earningsReactionPct=null;
  if(ok(m.epsActual)&&ok(m.epsEstimate)&&m.epsEstimate!==0){
    const s=(m.epsActual-m.epsEstimate)/Math.abs(m.epsEstimate)*100;
    if(Math.abs(s)<=100) earningsReactionPct=s;
  }

  const currency=
    t.endsWith(".SW")?"CHF":t.endsWith(".L")?"GBP":
    [".PA",".DE",".MI",".MC",".AS",".BR",".HE",".ST",".CO"].some(s=>t.endsWith(s))?"EUR":
    t.endsWith(".T")?"JPY":t.endsWith(".AX")?"AUD":t.endsWith(".KS")?"KRW":
    t.endsWith(".TW")?"TWD":"USD";

  return {roe,ebitMargin,equityRatio,pe,pe5yAvg,analystBuyPct,
    earningsReactionPct,epsRevision4w:null,perf6m,perf12m,epsGrowthYoY,
    analystTargetUpside,currentPrice,currency};
}

async function fetchWithRetry(stock, key){
  let lastErr;
  for(let i=0; i<=MAX_RETRIES; i++){
    try { return await fetchFinnhubStock(stock, key); }
    catch(e){
      lastErr = e;
      // Don't retry auth/rate errors
      if(e.message.includes("401")||e.message.includes("403")||e.message.includes("429")) throw e;
      if(i < MAX_RETRIES) await new Promise(r=>setTimeout(r, RETRY_DELAY_MS*(i+1)));
    }
  }
  // Fallback: use static training data so stock still gets a score
  const staticEntry = STATIC_STOCK_DATA.find(s=>s.ticker===stock.ticker);
  if(staticEntry){
    console.warn("Finnhub fehlgeschlagen fuer "+stock.ticker+", nutze statische Daten. Fehler: "+lastErr.message);
    return {...staticEntry, _usedFallback:true};
  }
  throw lastErr;
}

const scoreCol = s => s>=4?C.green:s>=0?C.yellow:C.red;
const recBg    = r => r==="KAUFEN"?C.greenGlow:r==="VERKAUFEN"?C.redGlow:C.yellowGlow;
const recBdr   = r => r==="KAUFEN"?C.green+"55":r==="VERKAUFEN"?C.red+"55":C.yellow+"55";
const recCol   = r => r==="KAUFEN"?C.green:r==="VERKAUFEN"?C.red:C.yellow;
const fmtS     = s => (s>0?"+":"")+s;
const EU_FLAGS = ["🇩🇪","🇫🇷","🇬🇧","🇨🇭","🇳🇱","🇮🇹","🇪🇸","🇫🇮","🇸🇪","🇩🇰","🇧🇪","🇦🇹","🇵🇹","🇳🇴"];
const REGIONS  = ["Alle","🇺🇸 USA","🇪🇺 Europa","🇯🇵 Japan","🇨🇳 China","🇮🇳 Indien","🇦🇺 Ozeanien","Andere"];

function regionMatch(s,f){
  if(f==="Alle") return true;
  if(f==="🇺🇸 USA") return s.region==="🇺🇸";
  if(f==="🇪🇺 Europa") return EU_FLAGS.includes(s.region);
  if(f==="🇯🇵 Japan") return s.region==="🇯🇵";
  if(f==="🇨🇳 China") return s.region==="🇨🇳";
  if(f==="🇮🇳 Indien") return s.region==="🇮🇳";
  if(f==="🇦🇺 Ozeanien") return ["🇦🇺","🇳🇿"].includes(s.region);
  return !["🇺🇸",...EU_FLAGS,"🇯🇵","🇨🇳","🇮🇳","🇦🇺","🇳🇿"].includes(s.region);
}

function exportCSV(rows,name){
  const csv=rows.map(r=>r.map(v=>'"'+String(v??"").replace(/"/g,'""')+'"').join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download=name; a.click();
}

      background:C.surface,borderRadius:"10px 10px 0 0",position:"sticky",top:0,zIndex:10}}>
      <span>#</span><span>Name</span>
      <span style={{textAlign:"center"}}>WKN</span>
      <span style={{textAlign:"center"}}>Score</span>
      <span style={{textAlign:"center"}}>Daten</span>
      <span style={{textAlign:"center"}}>Kurs</span>
      <span style={{textAlign:"center"}}>Rating</span>
    </div>
    {sorted.map((s,i)=><div key={s.ticker} style={{
      display:"grid",gridTemplateColumns:"38px 1fr 78px 76px 48px 68px 88px",
      padding:"10px 15px",borderBottom:"1px solid "+C.border,
      background:i%2===0?"transparent":"#0b0d15",alignItems:"center"}}>
      <span style={{fontFamily:C.mono,fontSize:11,fontWeight:700,color:i<3?C.accent:C.muted}}>{i+1}</span>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{fontSize:12}}>{s.region}</span>
          <span style={{fontWeight:600,fontSize:13,lineHeight:1.2}}>{s.name}</span>
        </div>
        <div style={{fontSize:10,color:C.subtext,fontFamily:C.mono,marginTop:1}}>{s.ticker} · {s.sector}</div>
      </div>
      <div style={{textAlign:"center"}}>
        <span style={{fontFamily:C.mono,fontSize:11,fontWeight:600,
          color:WKN[s.ticker]?C.text:C.muted,background:WKN[s.ticker]?C.border:"transparent",
          padding:"2px 5px",borderRadius:4}}>{WKN[s.ticker]||"—"}</span>
      </div>
      <div style={{textAlign:"center"}}>
        <span style={{fontFamily:C.mono,fontSize:16,fontWeight:700,color:scoreCol(s.totalScore),display:"block",lineHeight:1}}>{fmtS(s.totalScore)}</span>
        <div style={{marginTop:3,padding:"0 6px"}}><ScoreBar score={s.totalScore}/></div>
        <div style={{marginTop:3}}><Dots criteria={s.criteria}/></div>
      </div>
      <div style={{textAlign:"center"}}>
        <span style={{fontSize:10,fontFamily:C.mono,fontWeight:600,
          color:(s.dataCompleteness||0)>=70?C.green:(s.dataCompleteness||0)>=40?C.yellow:C.red}}>
          {s.dataCompleteness||0}%</span>
      </div>
      <div style={{textAlign:"center"}}>
        {s.currentPrice!=null?<div>
          <span style={{fontFamily:C.mono,fontSize:12,fontWeight:600}}>{s.currentPrice.toFixed(2)}</span>
          <div style={{fontSize:9,color:C.muted}}>{s.currency||""}</div>
        </div>:<span style={{color:C.muted,fontSize:11}}>—</span>}
      </div>
      <div style={{textAlign:"center"}}><Badge rec={s.recommendation}/></div>
    </div>)}
    <div style={{padding:"11px 15px",fontSize:10,color:C.muted,textAlign:"center",borderTop:"1px solid "+C.border,lineHeight:1.6}}>
      {sorted.length} Aktien · {new Date().toLocaleDateString("de-DE")} · Keine Anlageberatung · WKN ohne Gewaehr
    </div>
  </div>;
}

// ── Root App ────────────────────────────────────────────────────────
function App(){
  const [mode,       setMode]       = useState("static");
  const [apiKey,     setApiKey]     = useState("");
  const [count,      setCount]      = useState(50);
  const [running,    setRunning]    = useState(false);
  const [results,    setResults]    = useState([]);
  const [errors,     setErrors]     = useState([]);
  const [progress,   setProgress]   = useState(0);
  const [curTicker,  setCurTicker]  = useState("");
  const [done,       setDone]       = useState(false);
  const [activeTab,  setActiveTab]  = useState("scanner");

  const abortRef=useRef(false);
  const resRef=useRef([]);
  const errRef=useRef([]);

  const maxN = Math.min(count, STATIC_STOCK_DATA.length);

  function runStatic(){
    const data = STATIC_STOCK_DATA.slice(0,maxN).map(s=>({...s,...calcScore(s,s.sector)}));
    setResults(data); setErrors([]); setProgress(100); setDone(true);
  }

  async function runFinnhub(){
    if(!apiKey.trim()) return;
    abortRef.current=false; resRef.current=[]; errRef.current=[];
    setRunning(true); setDone(false); setResults([]); setErrors([]); setProgress(0);
    const batch=STATIC_STOCK_DATA.slice(0,maxN);
    let done_=0;
    for(let i=0; i<batch.length; i+=CONCURRENCY){
      if(abortRef.current) break;
      const chunk=batch.slice(i,i+CONCURRENCY);
      setCurTicker(chunk.map(s=>s.ticker).join(", "));
      const settled=await Promise.allSettled(chunk.map(async s=>{
        const raw=await fetchWithRetry(s,apiKey);
        return {...s,...raw,...calcScore(raw,s.sector)};
      }));
      settled.forEach((r,idx)=>{
        if(r.status==="fulfilled"){resRef.current=[...resRef.current,r.value];setResults([...resRef.current]);}
        else{errRef.current=[...errRef.current,{...chunk[idx],error:r.reason?.message||"Fehler"}];setErrors([...errRef.current]);}
      });
      done_+=chunk.length;
      setProgress(Math.round(done_/batch.length*100));
      // Pause between batches — prevents 429 rate limit on Finnhub free plan
      if(i+CONCURRENCY < batch.length) await new Promise(r=>setTimeout(r, BATCH_DELAY_MS));
    }
    setRunning(false); setDone(true); setCurTicker("");
  }

  const TABS=[{id:"scanner",label:"⚡ Scanner"},{id:"report",label:"📋 Ergebnisse"+(results.length>0?" ("+results.length+")":"")}];

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:C.sans,
      paddingTop:"env(safe-area-inset-top)",paddingBottom:"env(safe-area-inset-bottom)"}}>
      {/* Header */}
      <div style={{background:C.surface,borderBottom:"1px solid "+C.border,padding:"20px 20px 16px"}}>
        <div style={{maxWidth:860,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:C.accent,boxShadow:"0 0 8px "+C.accent}}/>
            <span style={{fontSize:9,letterSpacing:3,color:C.accent,fontFamily:C.mono,textTransform:"uppercase"}}>MSCI ACWI · Levermann v5.0</span>
          </div>
          <h1 style={{fontSize:22,fontWeight:700,letterSpacing:-0.5}}>Top-30 <span style={{color:C.accent}}>Screening</span></h1>
          <p style={{color:C.subtext,fontSize:12,marginTop:4}}>
            {STATIC_STOCK_DATA.length} Aktien · Deterministisches Scoring · Statisch + Finnhub Live
          </p>
        </div>
      </div>
      {/* Tabs */}
      <div style={{background:C.surface,borderBottom:"1px solid "+C.border}}>
        <div style={{maxWidth:860,margin:"0 auto",display:"flex"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setActiveTab(t.id)} style={{
            padding:"12px 20px",background:"transparent",border:"none",
            borderBottom:"2px solid "+(activeTab===t.id?C.accent:"transparent"),
            color:activeTab===t.id?C.accent:C.subtext,
            fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:C.sans,transition:"all .15s"}}>{t.label}</button>)}
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"20px"}}>
        {activeTab==="scanner"&&<>
          {/* Mode */}
          <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"18px",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Modus wählen</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[{id:"static",icon:"⚡",title:"Statisch",sub:"Sofort · Kein Key nötig · ~Anfang 2025"},
                {id:"finnhub",icon:"📡",title:"Finnhub Live",sub:"Echtdaten · Als PWA deployen · Key nötig"}
              ].map(m=><div key={m.id} onClick={()=>setMode(m.id)} style={{
                padding:"14px",borderRadius:10,cursor:"pointer",transition:"all .15s",
                border:"2px solid "+(mode===m.id?C.accent:C.border),
                background:mode===m.id?C.accentGlow:"transparent"}}>
                <div style={{fontSize:20,marginBottom:6}}>{m.icon}</div>
                <div style={{fontWeight:700,fontSize:13,color:mode===m.id?C.accent:C.text}}>{m.title}</div>
                <div style={{fontSize:11,color:C.subtext,marginTop:3,lineHeight:1.5}}>{m.sub}</div>
              </div>)}
            </div>
          </div>

          {/* Finnhub Key */}
          {mode==="finnhub"&&<div style={{background:C.card,border:"1px solid "+(!apiKey?C.accent+"55":C.green+"55"),borderRadius:14,padding:"18px",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>🔑 Finnhub API Key</div>
            <input type="password" placeholder="Kostenloser Key von finnhub.io" value={apiKey}
              onChange={e=>setApiKey(e.target.value)}/>
            <div style={{fontSize:11,color:C.subtext,marginTop:8,lineHeight:1.6}}>
              1. <a href="https://finnhub.io" style={{color:C.accent}}>finnhub.io</a> → Registrieren (kostenlos) → Dashboard → API Key kopieren<br/>
              2. Key hier einfügen → Analyse starten<br/>
              <span style={{color:C.yellow}}>⚠ Funktioniert nur in der deployed PWA, nicht im Claude Artifact-Preview.</span>
            </div>
          </div>}

          {/* Slider + Button */}
          <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"18px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:12}}>
              <div>
                <span style={{fontSize:28,fontWeight:700,fontFamily:C.mono,color:C.accent}}>{maxN}</span>
                <span style={{fontSize:13,color:C.subtext,marginLeft:6}}>Aktien</span>
                {mode==="static"&&<span style={{fontSize:11,color:C.green,marginLeft:10}}>⚡ Sofort</span>}
              </div>
              {mode==="finnhub"&&<span style={{fontSize:11,color:C.subtext}}>~{Math.ceil(maxN/50)*4}-{Math.ceil(maxN/50)*7} Min.</span>}
            </div>
            <input type="range" min={10} max={STATIC_STOCK_DATA.length} step={10} value={count}
              onChange={e=>setCount(+e.target.value)} disabled={running} style={{width:"100%"}}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
              {[10,25,50,75,100].map(v=><span key={v} onClick={()=>!running&&setCount(v)} style={{
                fontSize:9,fontFamily:C.mono,cursor:"pointer",
                color:v===count?C.accent:C.muted,fontWeight:v===count?700:400}}>{v}</span>)}
            </div>
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={mode==="static"?runStatic:runFinnhub}
                disabled={running||(mode==="finnhub"&&!apiKey)}
                style={{flex:1,padding:"13px",borderRadius:10,border:"none",
                  background:(running||(mode==="finnhub"&&!apiKey))?C.border:"linear-gradient(135deg,"+C.accent+",#2855c8)",
                  color:(running||(mode==="finnhub"&&!apiKey))?C.muted:"#fff",
                  fontWeight:700,fontSize:14,cursor:(running||(mode==="finnhub"&&!apiKey))?"not-allowed":"pointer",
                  fontFamily:C.sans,transition:"all .2s"}}>
                {running?("Analysiere... ("+progress+"%)"):done?"Erneut analysieren":(maxN+" Aktien analysieren")}
              </button>
              {running&&<button onClick={()=>{abortRef.current=true;setRunning(false);setDone(true);}} style={{
                padding:"13px 18px",borderRadius:10,border:"1px solid "+C.red+"44",
                background:C.redGlow,color:C.red,fontWeight:600,fontSize:13,
                cursor:"pointer",fontFamily:C.sans}}>Stop</button>}
            </div>
          </div>

          {/* Progress */}
          {running&&<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"16px 18px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
              <span style={{fontSize:12,color:C.subtext,animation:"pulse 1.5s infinite"}}>{"Analysiere: "+curTicker}</span>
              <span style={{fontFamily:C.mono,fontSize:12,color:C.accent}}>{progress}%</span>
            </div>
            <div style={{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",width:progress+"%",background:"linear-gradient(90deg,"+C.accent+","+C.green+")",borderRadius:3,transition:"width .3s"}}/>
            </div>
            {errors.length>0&&<details style={{marginTop:8}}>
              <summary style={{fontSize:11,color:C.red,cursor:"pointer"}}>{errors.length} Fehler</summary>
              <div style={{fontSize:10,color:C.subtext,marginTop:4,fontFamily:C.mono,lineHeight:1.8}}>
                {errors.map(e=>e.ticker+": "+e.error).join(" | ")}
              </div>
            </details>}
          </div>}

          <ResultsTable results={results} isFinnhub={mode==="finnhub"}/>

          {!running&&!done&&<div style={{background:C.card,border:"1px dashed "+C.border,borderRadius:14,padding:"50px 24px",textAlign:"center"}}>
            <div style={{fontSize:42,marginBottom:14}}>🌍</div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>MSCI ACWI Levermann-Screening</div>
            <div style={{color:C.subtext,fontSize:13,lineHeight:1.8}}>
              Modus wählen → Anzahl einstellen → Analyse starten<br/>
              <span style={{fontSize:11,color:C.muted}}>{STATIC_STOCK_DATA.length} Aktien · Deterministisches Scoring</span>
            </div>
          </div>}
        </>}

        {activeTab==="report"&&<ReportTab results={results}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
