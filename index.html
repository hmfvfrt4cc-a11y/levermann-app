<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Levermann" />
  <meta name="theme-color" content="#f2f2f7" />
  <title>Levermann ACWI — iOS Edition</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23f2f2f7'/><text y='75' x='10' font-size='75'>📈</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f2f2f7;
      --bg-grad-1:#ffffff;
      --bg-grad-2:#edf0f8;
      --card:rgba(255,255,255,.72);
      --card-strong:rgba(255,255,255,.86);
      --card-solid:#ffffff;
      --border:rgba(34,34,34,.07);
      --border-strong:rgba(34,34,34,.1);
      --text:#111111;
      --subtext:#5f6472;
      --muted:#7b8091;
      --accent:#0A84FF;
      --accent-2:#5AC8FA;
      --accent-glow:rgba(10,132,255,.14);
      --green:#30D158;
      --green-glow:rgba(48,209,88,.15);
      --yellow:#FF9F0A;
      --yellow-glow:rgba(255,159,10,.16);
      --red:#FF453A;
      --red-glow:rgba(255,69,58,.15);
      --shadow-xl:0 24px 44px rgba(15,23,42,.12);
      --shadow-lg:0 16px 30px rgba(15,23,42,.10);
      --shadow-md:0 10px 18px rgba(15,23,42,.08);
      --radius-xl:26px;
      --radius-lg:22px;
      --radius-md:18px;
      --radius-sm:14px;
      --sans:'DM Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
      --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{min-height:100%}
    body{
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1000px 620px at 0% -10%, rgba(10,132,255,.11), transparent 55%),
        radial-gradient(800px 500px at 100% 0%, rgba(90,200,250,.10), transparent 48%),
        linear-gradient(180deg,var(--bg-grad-1) 0%, var(--bg) 46%, var(--bg-grad-2) 100%);
      overscroll-behavior:none;
    }
    a{color:var(--accent);text-decoration:none}
    button,input,select{font:inherit}
    button{border:none;background:none;color:inherit;cursor:pointer}
    .app{min-height:100vh;padding-bottom:env(safe-area-inset-bottom);position:relative;isolation:isolate}
    .app::before,.app::after{content:"";position:fixed;pointer-events:none;z-index:-1;filter:blur(45px);opacity:.48}
    .app::before{top:90px;right:-60px;width:220px;height:220px;background:radial-gradient(circle, rgba(10,132,255,.18), transparent 70%)}
    .app::after{left:-60px;bottom:90px;width:200px;height:200px;background:radial-gradient(circle, rgba(90,200,250,.15), transparent 70%)}
    .shell{max-width:1100px;margin:0 auto;padding:0 20px}
    .glass{
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      background:var(--card);
      border:1px solid rgba(255,255,255,.55);
      box-shadow:var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,.55);
    }
    .topbar,.tabbar{position:sticky;z-index:40}
    .topbar{top:0;border-bottom:1px solid rgba(255,255,255,.55)}
    .topbar-inner{padding:20px 0 18px}
    .eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .eyebrow-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 5px rgba(10,132,255,.12)}
    .eyebrow-text{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#4a5d86}
    .headline{font-size:32px;line-height:1.02;letter-spacing:-.9px;font-weight:800}
    .accent{color:var(--accent)}
    .subtitle{margin-top:8px;color:var(--subtext);font-size:13px;line-height:1.75;max-width:72ch}
    .quick-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .quick-badge{padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.78);box-shadow:inset 0 1px 0 rgba(255,255,255,.85);font-size:10px;color:#40506f}
    .tabbar{top:110px;padding:8px 0 10px}
    .tabs-wrap{padding:6px;border-radius:18px}
    .tabs{display:flex;gap:6px}
    .tab-btn{flex:0 0 auto;padding:11px 16px;border-radius:14px;font-size:13px;font-weight:700;color:var(--subtext);transition:all .16s ease}
    .tab-btn.active{background:rgba(255,255,255,.75);color:var(--text);box-shadow:var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.85)}
    .tab-btn:hover{transform:translateY(-1px)}
    .main{padding:20px 0 30px}

    .hero{padding:24px;border-radius:var(--radius-xl);margin-bottom:18px;overflow:hidden;position:relative}
    .hero::before{content:"";position:absolute;right:-50px;top:-40px;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle, rgba(10,132,255,.18), transparent 70%)}
    .hero::after{content:"";position:absolute;left:-40px;bottom:-35px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle, rgba(90,200,250,.16), transparent 72%)}
    .hero-grid{position:relative;z-index:1;display:grid;grid-template-columns:1.25fr 1fr;gap:18px;align-items:stretch}
    .hero-tag{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(10,132,255,.12);border:1px solid rgba(10,132,255,.18);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#2b5ca1}
    .hero-tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent)}
    .hero-title{font-size:30px;line-height:1.03;letter-spacing:-.8px;font-weight:800;max-width:13ch;margin-top:12px}
    .hero-copy p{margin-top:12px;color:var(--subtext);font-size:13px;line-height:1.8;max-width:62ch}
    .hero-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
    .hero-badge{padding:7px 11px;border-radius:999px;background:rgba(255,255,255,.58);border:1px solid rgba(255,255,255,.78);box-shadow:inset 0 1px 0 rgba(255,255,255,.86);font-size:10px;color:#44516c}
    .hero-metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .metric-card{padding:14px;border-radius:22px;background:rgba(255,255,255,.64);border:1px solid rgba(255,255,255,.72);box-shadow:var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.88);min-height:116px;display:flex;flex-direction:column;justify-content:space-between}
    .metric-card.blue{background:linear-gradient(180deg, rgba(239,247,255,.92), rgba(255,255,255,.7));}
    .metric-card.green{background:linear-gradient(180deg, rgba(239,255,244,.92), rgba(255,255,255,.72));}
    .metric-card.yellow{background:linear-gradient(180deg, rgba(255,248,235,.96), rgba(255,255,255,.74));}
    .metric-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#6b7896}
    .metric-value{margin-top:4px;font-family:var(--mono);font-size:25px;font-weight:800;letter-spacing:-.3px}
    .metric-sub{margin-top:6px;color:var(--subtext);font-size:11px;line-height:1.55}

    .stack{display:grid;gap:14px}
    .card{padding:18px;border-radius:var(--radius-lg);position:relative;overflow:hidden}
    .section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:14px}
    .section-kicker{font-size:10px;letter-spacing:1.25px;text-transform:uppercase;color:#6482b5;margin-bottom:6px}
    .section-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
    .section-desc{margin-top:4px;font-size:12px;color:var(--subtext);line-height:1.65}
    .section-pills{display:flex;gap:8px;flex-wrap:wrap}
    .section-pill{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.68);border:1px solid rgba(255,255,255,.8);box-shadow:inset 0 1px 0 rgba(255,255,255,.86);font-size:10px;color:#485770}

    .mode-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .mode-option{padding:15px;border-radius:20px;text-align:left;transition:all .15s ease;background:rgba(255,255,255,.48);border:1px solid rgba(255,255,255,.76);box-shadow:inset 0 1px 0 rgba(255,255,255,.86)}
    .mode-option.active{background:linear-gradient(180deg, rgba(241,248,255,.96), rgba(255,255,255,.82));border-color:rgba(10,132,255,.18);box-shadow:var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.94)}
    .mode-option:hover,.chip:hover,.btn-primary:hover:not(:disabled),.btn-secondary:hover,.btn-export:hover{transform:translateY(-1px)}
    .mode-icon{font-size:22px;margin-bottom:8px}
    .mode-title{font-size:14px;font-weight:700}
    .mode-title.active{color:var(--accent)}
    .mode-sub{margin-top:4px;color:var(--subtext);line-height:1.55;font-size:11px}

    .field{width:100%;padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.82);box-shadow:inset 0 1px 0 rgba(255,255,255,.92);color:var(--text);font-family:var(--mono);font-size:13px;outline:none}
    .field:focus{border-color:rgba(10,132,255,.22);box-shadow:0 0 0 5px rgba(10,132,255,.10), inset 0 1px 0 rgba(255,255,255,.94)}
    .api-note{margin-top:10px;font-size:11px;line-height:1.75;color:var(--subtext)}
    .api-note .warn{color:#aa6a00}
    .controls-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:14px}
    .controls-value{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
    .count-value{font-size:30px;line-height:1;font-weight:800;font-family:var(--mono);color:var(--accent)}
    .estimate{font-size:11px;color:var(--subtext)}
    .small-pill{font-size:11px;color:var(--green)}
    input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:999px;background:rgba(120,120,128,.18);outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:1px solid rgba(10,132,255,.18);box-shadow:0 8px 18px rgba(10,132,255,.18)}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;border:1px solid rgba(10,132,255,.18);background:#fff;box-shadow:0 8px 18px rgba(10,132,255,.18)}
    .ticks{display:flex;justify-content:space-between;gap:6px;flex-wrap:wrap;margin-top:8px}
    .tick-btn{font-family:var(--mono);font-size:10px;color:var(--muted)}
    .tick-btn.active{color:var(--accent);font-weight:700}
    .btn-row{display:flex;gap:10px;margin-top:16px}
    .btn-primary,.btn-secondary,.btn-export{transition:all .15s ease}
    .btn-primary{flex:1;padding:14px 16px;border-radius:18px;font-size:14px;font-weight:800;background:linear-gradient(180deg, #1394ff 0%, #007aff 100%);color:#fff;box-shadow:0 16px 28px rgba(10,132,255,.22), inset 0 1px 0 rgba(255,255,255,.35)}
    .btn-primary:disabled{background:linear-gradient(180deg, #b7c3d4 0%, #aab6c8 100%);color:#eff2f7;cursor:not-allowed;box-shadow:none}
    .btn-secondary{padding:14px 18px;border-radius:18px;font-size:13px;font-weight:800;background:rgba(255,69,58,.12);color:var(--red);border:1px solid rgba(255,69,58,.16)}
    .btn-export{padding:8px 12px;border-radius:14px;background:rgba(10,132,255,.10);border:1px solid rgba(10,132,255,.16);color:var(--accent);font-size:11px;font-weight:700}
    .note{margin-top:12px;padding:12px;border-radius:16px;background:rgba(255,159,10,.12);border:1px solid rgba(255,159,10,.16);color:#8a5600;font-size:11px;line-height:1.65}

    .progress-top{display:flex;justify-content:space-between;gap:14px;margin-bottom:8px}
    .progress-title{font-size:12px;color:var(--subtext);animation:pulse 1.5s infinite}
    .progress-pct{font-size:12px;font-family:var(--mono);color:var(--accent)}
    .progress-bar{height:8px;border-radius:999px;background:rgba(120,120,128,.16);overflow:hidden}
    .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .25s ease}
    details{margin-top:8px}
    details summary{list-style:none;cursor:pointer;font-size:11px;color:var(--red)}
    details summary::-webkit-details-marker{display:none}
    .error-list{margin-top:5px;font-family:var(--mono);font-size:10px;line-height:1.8;color:var(--subtext);word-break:break-word}

    .panel{padding:14px;border-radius:var(--radius-lg)}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{padding:6px 11px;border-radius:999px;background:rgba(255,255,255,.52);border:1px solid rgba(255,255,255,.76);box-shadow:inset 0 1px 0 rgba(255,255,255,.86);font-size:11px;color:var(--subtext)}
    .chip.active-default{background:rgba(10,132,255,.12);border-color:rgba(10,132,255,.18);color:var(--accent)}
    .chip.active-green{background:var(--green-glow);border-color:rgba(48,209,88,.18);color:var(--green)}
    .chip.active-yellow{background:var(--yellow-glow);border-color:rgba(255,159,10,.18);color:var(--yellow)}
    .chip.active-red{background:var(--red-glow);border-color:rgba(255,69,58,.18);color:var(--red)}

    .table-shell{margin-top:12px;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.82);box-shadow:var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,.86)}
    .table-head,.table-row{display:grid;align-items:center;gap:10px}
    .table-head{padding:9px 14px;background:rgba(255,255,255,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(120,120,128,.12);font-size:9px;color:#798094;letter-spacing:1.4px;text-transform:uppercase;font-family:var(--mono)}
    .table-row{padding:12px 14px;border-bottom:1px solid rgba(120,120,128,.10);background:rgba(255,255,255,.56);position:relative;transition:background .12s ease}
    .table-row.alt{background:rgba(255,255,255,.42)}
    .table-row.clickable{cursor:pointer}
    .table-row::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .14s ease;background:linear-gradient(90deg, rgba(10,132,255,.05), transparent 36%, transparent 68%, rgba(90,200,250,.04))}
    .table-row:hover::after,.table-row.expanded::after{opacity:1}
    .table-row.clickable:hover{background:rgba(255,255,255,.66)}
    .rank{font-family:var(--mono);font-size:12px;font-weight:800;color:#7e8495}
    .rank.top{color:var(--accent)}
    .name-main{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:13px;font-weight:700}
    .name-sub{margin-top:2px;font-size:10px;color:var(--subtext);font-family:var(--mono)}
    .score-value{display:block;font-size:17px;font-family:var(--mono);font-weight:800;line-height:1}
    .score-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0;border-radius:12px;background:none;border:none;width:100%}
    .score-btn:hover .score-value{text-decoration:underline}
    .score-btn:focus-visible{outline:2px solid var(--accent);outline-offset:4px;border-radius:12px}
    .score-bar{width:100%;height:4px;background:rgba(120,120,128,.16);border-radius:999px;overflow:hidden}
    .score-bar > span{display:block;height:100%;border-radius:999px}
    .badge{display:inline-flex;align-items:center;justify-content:center;padding:4px 9px;border-radius:999px;font-size:9px;font-weight:800;letter-spacing:.8px;border:1px solid transparent}
    .badge.buy{background:var(--green-glow);border-color:rgba(48,209,88,.18);color:var(--green)}
    .badge.hold{background:var(--yellow-glow);border-color:rgba(255,159,10,.18);color:var(--yellow)}
    .badge.sell{background:var(--red-glow);border-color:rgba(255,69,58,.18);color:var(--red)}
    .source-badge{display:inline-flex;align-items:center;justify-content:center;padding:4px 7px;border-radius:999px;font-size:9px;font-weight:700;letter-spacing:.5px;background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.84)}
    .source-badge.live{color:var(--green)}
    .source-badge.fallback{color:var(--yellow)}
    .source-badge.static{color:var(--accent)}
    .good{color:var(--green)}
    .mid{color:var(--yellow)}
    .bad{color:var(--red)}
    .criteria-shell{padding:12px 14px;background:rgba(255,255,255,.74);border-top:1px solid rgba(120,120,128,.11)}
    .criteria-header{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px}
    .criteria-title{font-size:13px;font-weight:800}
    .criteria-sub{margin-top:2px;font-size:11px;color:var(--subtext);line-height:1.6}
    .criteria-sum{padding:8px 10px;border-radius:14px;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.84);font-size:11px;color:#4d5669;box-shadow:inset 0 1px 0 rgba(255,255,255,.88)}
    .criteria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px}
    .criterion{display:flex;gap:10px;align-items:flex-start;padding:10px;border-radius:18px;background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.84);box-shadow:inset 0 1px 0 rgba(255,255,255,.92)}
    .criterion.pos{background:linear-gradient(180deg, rgba(242,255,246,.96), rgba(255,255,255,.86))}
    .criterion.neg{background:linear-gradient(180deg, rgba(255,244,244,.96), rgba(255,255,255,.86))}
    .criterion.na{background:linear-gradient(180deg, rgba(248,249,252,.96), rgba(255,255,255,.86))}
    .bubble{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;font-family:var(--mono);background:rgba(120,120,128,.10);border:1.5px solid rgba(120,120,128,.18);color:#6d7484;flex:0 0 auto}
    .criterion.pos .bubble{background:rgba(48,209,88,.08);border-color:rgba(48,209,88,.28);color:var(--green)}
    .criterion.neg .bubble{background:rgba(255,69,58,.08);border-color:rgba(255,69,58,.22);color:var(--red)}
    .criterion.na .bubble{background:rgba(120,120,128,.06);border-color:rgba(120,120,128,.16);color:#7b8191}
    .criterion-title{font-size:10px;font-weight:800}
    .criterion-value{font-size:10px;color:var(--accent);font-family:var(--mono);margin-top:3px}
    .criterion-reason{font-size:9px;color:var(--subtext);margin-top:2px;line-height:1.4}
    .criterion-impact{margin-top:6px;display:inline-flex;padding:3px 7px;border-radius:999px;background:rgba(120,120,128,.08);font-size:9px;font-weight:800;color:#576178}
    .legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px;color:var(--subtext);font-size:10px}
    .legend-item{display:inline-flex;align-items:center;gap:6px}
    .legend-box{width:10px;height:10px;border-radius:3px;border:1px solid rgba(120,120,128,.16)}
    .footer-note{padding:11px 14px;text-align:center;font-size:10px;color:#788194;line-height:1.65;border-top:1px solid rgba(120,120,128,.10);background:rgba(255,255,255,.54)}

    .stats-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px}
    .stat-card{padding:14px 12px;border-radius:20px;text-align:center}
    .stat-icon{font-size:16px;margin-bottom:6px}
    .stat-value{font-size:21px;font-weight:800;font-family:var(--mono);line-height:1}
    .stat-label{margin-top:5px;font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--subtext)}
    .source-strip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px}
    .source-tile{padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.56);border:1px solid rgba(255,255,255,.8);box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
    .source-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#6a7998}
    .source-value{margin-top:4px;font-family:var(--mono);font-size:20px;font-weight:800}
    .source-sub{margin-top:5px;font-size:11px;color:var(--subtext);line-height:1.55}
    .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    .toolbar-right{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
    .wkn-pill{display:inline-flex;padding:3px 6px;border-radius:10px;font-size:11px;font-family:var(--mono);font-weight:700}
    .wkn-pill.has{background:rgba(120,120,128,.12);color:var(--text)}
    .wkn-pill.none{color:var(--muted)}
    .dots{display:flex;gap:2px;justify-content:center;margin-top:4px}
    .dot{width:4px;height:4px;border-radius:50%;background:rgba(120,120,128,.36)}
    .dot.pos{background:var(--green)}
    .dot.neg{background:var(--red)}

    .log-wrap{display:grid;grid-template-columns:1.2fr .8fr;gap:12px}

    .log-meta{margin-top:3px;font-size:10px;color:var(--subtext);font-family:var(--mono)}
    .log-error{margin-top:5px;font-size:10px;color:#8a5600;line-height:1.5}
    .placeholder{padding:58px 24px;border-radius:var(--radius-xl);text-align:center}
    .placeholder-icon{font-size:42px;margin-bottom:14px}
    .placeholder-title{font-size:16px;font-weight:800;margin-bottom:8px}

    const sourceLabel = (source) => source === 'live' ? 'LIVE' : source === 'fallback' ? 'FALLBACK' : 'STATISCH';
    const scoreFillColor = (score) => score >= 4 ? 'var(--green)' : score >= 0 ? 'var(--yellow)' : 'var(--red)';
    const recommendationIndex = (rec) => ['KAUFEN','HALTEN','VERKAUFEN'].indexOf(rec);
    const sourceLogLabel = (source) => source === 'live' ? 'Finnhub Live' : source === 'fallback' ? 'Statischer Fallback' : 'Statischer Modus';
    function normalizeErrorText(errorText = '') {
      const raw = String(errorText || '');
      if (!raw) return '';
      if (raw.includes('<!DOCTYPE html') || raw.includes('<html')) return 'HTML-Antwort statt JSON von Finnhub';
      return raw;
    }
    function classifyRuntimeError(errorText = '') {
      const raw = normalizeErrorText(errorText).toLowerCase();
      if (!raw) return { code:'none', label:'Keine Fehler' };
      if (raw.includes('html-antwort') || raw.includes('html statt json') || raw.includes('waf-antwort') || raw.includes('provider-/rate-limit')) return { code:'html', label:'HTML statt JSON' };
      if (raw.includes('429') || raw.includes('rate limit')) return { code:'rate', label:'429 / Rate Limit' };
      if (raw.includes('401') || raw.includes('403') || raw.includes('ungültig') || raw.includes('ungueltig') || raw.includes('api key')) return { code:'auth', label:'401/403 / Auth' };
      if (raw.includes('netzwerk') || raw.includes('cors') || raw.includes('verbindung') || raw.includes('load failed')) return { code:'network', label:'Netzwerk / CORS' };
      return { code:'other', label:'Sonstiges' };
    }

    function isOptionalEndpointError(err) {
      const status = err && Number.isFinite(err._status) ? err._status : null;
      const msg = normalizeErrorText(err && (err.message || err) || '');
      const info = classifyRuntimeError(msg);
      return status === 403 || status === 429 || info.code === 'html' || info.code === 'rate' || info.code === 'network';
    }
    function compactEndpointWarning(err, endpointLabel) {
      const status = err && Number.isFinite(err._status) ? err._status : null;
      const msg = normalizeErrorText(err && (err.message || err) || 'Unbekannter Fehler');
      return `${endpointLabel}${status ? ` HTTP ${status}` : ''}: ${msg}`;
    }
    function regionMatch(stock, filter) {
      if (filter === 'Alle') return true;
      if (filter === '🇺🇸 USA') return stock.region === '🇺🇸';
      if (filter === '🇪🇺 Europa') return EU_FLAGS.includes(stock.region);
      if (filter === '🇯🇵 Japan') return stock.region === '🇯🇵';
      if (filter === '🇨🇳 China') return stock.region === '🇨🇳';
      if (filter === '🇮🇳 Indien') return stock.region === '🇮🇳';
      if (filter === '🇦🇺 Ozeanien') return ['🇦🇺','🇳🇿'].includes(stock.region);
      return !['🇺🇸', ...EU_FLAGS, '🇯🇵', '🇨🇳', '🇮🇳', '🇦🇺', '🇳🇿'].includes(stock.region);
    }

    function exportCSV(rows, filename) {
      const csv = rows.map(row => row.map(v => '"' + String(v ?? '').replace(/"/g, '""') + '"').join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type:'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1200);
    }

    const CacheService = (() => {
      const mem = new Map();
      const prefix = 'levermann-ios-cache:';
      const now = () => Date.now();
      const keyFor = (url) => prefix + encodeURIComponent(url);
      function get(url) {
        const hit = mem.get(url);
        if (hit && now() - hit.ts < CACHE_TTL_MS) return hit.data;
        try {
          const raw = localStorage.getItem(keyFor(url));
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || now() - parsed.ts >= CACHE_TTL_MS) {
            localStorage.removeItem(keyFor(url));
            return null;
          }
          mem.set(url, parsed);
          return parsed.data;
        } catch { return null; }
      }
      function set(url, data) {
        const entry = { data, ts: now() };
        mem.set(url, entry);
        try { localStorage.setItem(keyFor(url), JSON.stringify(entry)); } catch {}
      }
      return { get, set };
    })();

    function calcScore(source, sector) {
      const isFin = FINANCE_SECTORS.includes(sector);
      const criteria = [];
      const add = (id, name, score, value, reasoning, meta = {}) => criteria.push(Object.assign({ id, name, score, value, reasoning, active:true, applicable:true }, meta));
      const { roe, ebitMargin, equityRatio, pe5yAvg, pe, analystBuyPct, earningsReactionPct, perf6m, perf12m, epsGrowthYoY, analystTargetUpside } = source;

      if (!ok(roe)) add(1,'EK-Rendite',0,'n/v','Keine Daten',{ applicable:false });
      else if (roe > 0.20) add(1,'EK-Rendite',1,fmtPctAbs(roe * 100),'>20%');
      else if (roe >= 0.10) add(1,'EK-Rendite',0,fmtPctAbs(roe * 100),'10–20%');
      else add(1,'EK-Rendite',-1,fmtPctAbs(roe * 100),'<10%');

      if (isFin) add(2,'EBIT-Marge',0,'n/a','Für Finanz-/Versicherungswerte nicht anwendbar',{ applicable:false });
      else if (!ok(ebitMargin)) add(2,'EBIT-Marge',0,'n/v','Keine Daten',{ applicable:false });
      else if (ebitMargin > 0.12) add(2,'EBIT-Marge',1,fmtPctAbs(ebitMargin * 100),'>12%');
      else if (ebitMargin >= 0.06) add(2,'EBIT-Marge',0,fmtPctAbs(ebitMargin * 100),'6–12%');
      else add(2,'EBIT-Marge',-1,fmtPctAbs(ebitMargin * 100),'<6%');

      if (!ok(equityRatio)) add(3,'EK-Quote',0,'n/v','Keine Daten',{ applicable:false });
      else if (isFin) {
        if (equityRatio > 0.10) add(3,'EK-Quote',1,fmtPctAbs(equityRatio * 100),'>10% (Bank/Versicherung)');
        else if (equityRatio >= 0.05) add(3,'EK-Quote',0,fmtPctAbs(equityRatio * 100),'5–10% (Bank/Versicherung)');
        else add(3,'EK-Quote',-1,fmtPctAbs(equityRatio * 100),'<5% (Bank/Versicherung)');
      } else {
        if (equityRatio > 0.25) add(3,'EK-Quote',1,fmtPctAbs(equityRatio * 100),'>25%');
        else if (equityRatio >= 0.15) add(3,'EK-Quote',0,fmtPctAbs(equityRatio * 100),'15–25%');
        else add(3,'EK-Quote',-1,fmtPctAbs(equityRatio * 100),'<15%');
      }

      if (!ok(pe5yAvg) || pe5yAvg <= 0) add(4,'KGV 5 Jahre',0,'n/v','Keine Daten',{ applicable:false });
      else if (pe5yAvg < 12) add(4,'KGV 5 Jahre',1,Number(pe5yAvg).toFixed(1),'<12');
      else if (pe5yAvg <= 16) add(4,'KGV 5 Jahre',0,Number(pe5yAvg).toFixed(1),'12–16');
      else add(4,'KGV 5 Jahre',-1,Number(pe5yAvg).toFixed(1),'>16');

      if (!ok(pe) || pe <= 0) add(5,'KGV aktuell',0,'n/v','Keine Daten',{ applicable:false });
      else if (pe < 12) add(5,'KGV aktuell',1,Number(pe).toFixed(1),'<12');
      else if (pe <= 16) add(5,'KGV aktuell',0,Number(pe).toFixed(1),'12–16');
      else add(5,'KGV aktuell',-1,Number(pe).toFixed(1),'>16');

      if (!ok(analystBuyPct)) add(6,'Analysten',0,'n/v','Keine Daten',{ applicable:false });
      else if (analystBuyPct > 70) add(6,'Analysten',-1,fmtPctAbs(analystBuyPct, 0),'Kontraindikator: >70% bullisch');
      else if (analystBuyPct >= 50) add(6,'Analysten',0,fmtPctAbs(analystBuyPct, 0),'Gemischtes Bild');
      else add(6,'Analysten',1,fmtPctAbs(analystBuyPct, 0),'Kontraindikator: eher bearisch');

      if (!ok(earningsReactionPct)) add(7,'Quartalsreaktion',0,'n/v','Keine Daten',{ applicable:false });
      else if (earningsReactionPct > 1) add(7,'Quartalsreaktion',1,fmtPct(earningsReactionPct),'Positiv');
      else if (earningsReactionPct >= -1) add(7,'Quartalsreaktion',0,fmtPct(earningsReactionPct),'Neutral');
      else add(7,'Quartalsreaktion',-1,fmtPct(earningsReactionPct),'Negativ');

      add(8,'Gewinnrevision',0,'deaktiviert','Bewusst deaktiviert: in diesem Single-File-Setup keine robuste Gewinnrevisionsquelle verfügbar.',{ active:false, applicable:false });

      if (!ok(perf6m)) add(9,'Kurs 6M',0,'n/v','Keine Daten',{ applicable:false });
      else if (perf6m > 5) add(9,'Kurs 6M',1,fmtPct(perf6m),'Stark');
      else if (perf6m >= -5) add(9,'Kurs 6M',0,fmtPct(perf6m),'Seitwärts');
      else add(9,'Kurs 6M',-1,fmtPct(perf6m),'Schwach');

      if (!ok(perf12m)) add(10,'Kurs 1J',0,'n/v','Keine Daten',{ applicable:false });
      else if (perf12m > 5) add(10,'Kurs 1J',1,fmtPct(perf12m),'Stark');
      else if (perf12m >= -5) add(10,'Kurs 1J',0,fmtPct(perf12m),'Seitwärts');
      else add(10,'Kurs 1J',-1,fmtPct(perf12m),'Schwach');

      if (!ok(perf6m) || !ok(perf12m)) add(11,'Momentum',0,'n/v','Keine Daten',{ applicable:false });
      else if (perf6m > perf12m) add(11,'Momentum',1,'6M > 1J','Beschleunigend');
      else add(11,'Momentum',-1,'6M ≤ 1J','Abbremsend');

      if (!ok(epsGrowthYoY)) add(12,'Gewinnwachstum',0,'n/v','Keine Daten',{ applicable:false });
      else if (epsGrowthYoY > 0) add(12,'Gewinnwachstum',1,fmtPct(epsGrowthYoY),'Wachstum');
      else if (epsGrowthYoY === 0) add(12,'Gewinnwachstum',0,'0.0%','Unverändert');
      else add(12,'Gewinnwachstum',-1,fmtPct(epsGrowthYoY),'Rückgang');

      if (!ok(analystTargetUpside)) add(13,'Kurspotenzial',0,'n/v','Keine Daten',{ applicable:false });
      else if (analystTargetUpside > 15) add(13,'Kurspotenzial',1,fmtPct(analystTargetUpside),'>15%');
      else if (analystTargetUpside >= 0) add(13,'Kurspotenzial',0,fmtPct(analystTargetUpside),'0–15%');
      else add(13,'Kurspotenzial',-1,fmtPct(analystTargetUpside),'Negativ');

      const totalScore = criteria.filter(c => c.active).reduce((sum, c) => sum + c.score, 0);
      const recommendation = totalScore >= 4 ? 'KAUFEN' : totalScore <= 2 ? 'VERKAUFEN' : 'HALTEN';
      const applicable = criteria.filter(c => c.active && c.applicable).length;
      const available = criteria.filter(c => c.active && c.applicable && c.value !== 'n/v').length;
      const dataCompleteness = applicable ? Math.round((available / applicable) * 100) : 0;
      return { criteria, totalScore, recommendation, dataCompleteness };
    }

    const FinnhubService = (() => {
      const controllers = new Set();
      const addController = (ctrl) => { controllers.add(ctrl); return ctrl; };
      const removeController = (ctrl) => controllers.delete(ctrl);
      const buildUrl = (path, key) => `https://api.finnhub.io/api/v1/${path}&token=${encodeURIComponent(key)}`;

      let providerCooldownUntil = 0;
      async function waitForProviderCooldown() {
        const waitMs = providerCooldownUntil - Date.now();
        if (waitMs > 0) await sleep(waitMs);
      }
      function setProviderCooldown(ms) {
        providerCooldownUntil = Math.max(providerCooldownUntil, Date.now() + ms);
      }

      async function request(path, key, signal) {
        const url = buildUrl(path, key);
        const cached = CacheService.get(url);
        if (cached) return cached;

        await waitForProviderCooldown();

        let resp;
        try {
          resp = await fetch(url, { method:'GET', mode:'cors', credentials:'omit', headers:{ 'Accept':'application/json' }, signal });
        } catch (err) {
          if (err && err.name === 'AbortError') throw err;
          throw new Error(`Netzwerk: ${err.message} — CORS oder Verbindung. Key korrekt?`);
        }

        if (resp.status === 401 || resp.status === 403) throw new Error(`API Key ungültig (${resp.status}) — Key auf finnhub.io prüfen`);
        if (resp.status === 429) {
          setProviderCooldown(PROVIDER_COOLDOWN_RATE_MS);
          throw new Error('Rate Limit (429) — Finnhub verlangt Abkühlzeit. Statischer Fallback wird nach zusätzlichem Backoff verwendet, wenn keine Live-Antwort mehr kommt.');
        }
        if (!resp.ok) throw new Error(`Finnhub HTTP ${resp.status}`);

        const raw = await resp.text();
        if (!raw || raw.trim() === '') { CacheService.set(url, {}); return {}; }

        const trimmed = raw.trim();
        const contentType = (resp.headers.get('content-type') || '').toLowerCase();

        if (trimmed.startsWith('<!DOCTYPE html') || trimmed.startsWith('<html') || contentType.includes('text/html')) {
          setProviderCooldown(PROVIDER_COOLDOWN_HTML_MS);
          throw new Error('Finnhub lieferte HTML statt JSON (Provider-/Rate-Limit-/WAF-Antwort). Statischer Fallback wird verwendet.');
        }

        let data;
        try { data = JSON.parse(trimmed); } catch { throw new Error(`Finnhub lieferte kein gültiges JSON (${trimmed.slice(0,40)})`); }
        if (data && data.error) { CacheService.set(url, {}); return {}; }
        CacheService.set(url, data);
        return data;
      }

      function inferCurrency(ticker) {
        if (ticker.endsWith('.SW')) return 'CHF';
        if (ticker.endsWith('.L')) return 'GBP';
        if (['.PA','.DE','.MI','.MC','.AS','.BR','.HE','.ST','.CO'].some(s => ticker.endsWith(s))) return 'EUR';
        if (ticker.endsWith('.T')) return 'JPY';
        if (ticker.endsWith('.AX')) return 'AUD';
        if (ticker.endsWith('.KS')) return 'KRW';
        if (ticker.endsWith('.TW')) return 'TWD';
        return 'USD';
      }

      async function fetchStock(stock, key, signal) {
        const t = stock.ticker;
        const endpointWarnings = [];
        const metrics = await request(`stock/metric?symbol=${t}&metric=all`, key, signal);
        await sleep(REQUEST_GAP_MS);

        let recs = [];
        try {
          recs = await request(`stock/recommendation?symbol=${t}`, key, signal);
        } catch (err) {
          if (isOptionalEndpointError(err)) {
            endpointWarnings.push(compactEndpointWarning(err, 'stock/recommendation'));
            recs = [];
          } else {
            throw err;
          }
        }
        await sleep(REQUEST_GAP_MS);

        const quote = await request(`quote?symbol=${t}`, key, signal);
        await sleep(REQUEST_GAP_MS);

        let target = {};
        try {
          target = await request(`stock/price-target?symbol=${t}`, key, signal);
        } catch (err) {
          if (isOptionalEndpointError(err)) {
            endpointWarnings.push(compactEndpointWarning(err, 'stock/price-target'));
            target = {};
          } else {
            throw err;
          }
        }

        const m = (metrics && metrics.metric) || {};
        const nz = (v) => v !== null && v !== undefined && Number.isFinite(v) && v !== 0;
        let roe = nz(m.roeTTM) ? m.roeTTM / 100 : null;
        if (roe !== null && (roe > 5 || roe < -2)) roe = null;
        let ebitMargin = null;
        if (nz(m.ebitdMarginTTM)) ebitMargin = m.ebitdMarginTTM / 100;
        let equityRatio = null;
        if (nz(m.totalDebt2TotalEquityAnnual) && m.totalDebt2TotalEquityAnnual >= 0) equityRatio = 1 / (1 + m.totalDebt2TotalEquityAnnual);
        let pe = (nz(m.peTTM) && m.peTTM > 0 && m.peTTM < 2000) ? m.peTTM : null;
        let pe5yAvg = (nz(m.peBasicExclExtraTTM) && m.peBasicExclExtraTTM > 0) ? m.peBasicExclExtraTTM : null;
        let analystBuyPct = null;
        if (Array.isArray(recs) && recs.length > 0) {
          const r = recs[0];
          const total = (r.strongBuy || 0) + (r.buy || 0) + (r.hold || 0) + (r.sell || 0) + (r.strongSell || 0);
          if (total > 0) analystBuyPct = ((r.strongBuy || 0) + (r.buy || 0)) / total * 100;
        }
        const perf6m = nz(m['26WeekPriceReturnDaily']) ? m['26WeekPriceReturnDaily'] : null;
        const perf12m = nz(m['52WeekPriceReturnDaily']) ? m['52WeekPriceReturnDaily'] : null;
        const epsGrowthYoY = nz(m.epsGrowthTTMYoy) ? m.epsGrowthTTMYoy : null;
        const currentPrice = quote && nz(quote.c) && quote.c > 0 ? quote.c : null;
        let analystTargetUpside = null;
        if (target && nz(target.targetMean) && currentPrice) {
          analystTargetUpside = ((target.targetMean - currentPrice) / currentPrice) * 100;
          if (Math.abs(analystTargetUpside) > 200) analystTargetUpside = null;
        }
        let earningsReactionPct = null;
        if (nz(m.epsActual) && nz(m.epsEstimate) && m.epsEstimate !== 0) {
          const surprise = ((m.epsActual - m.epsEstimate) / Math.abs(m.epsEstimate)) * 100;
          if (Math.abs(surprise) <= 100) earningsReactionPct = surprise;
        }
        return {
          roe, ebitMargin, equityRatio, pe, pe5yAvg, analystBuyPct,
          earningsReactionPct, perf6m, perf12m, epsGrowthYoY,
          analystTargetUpside, currentPrice, currency: inferCurrency(t),
          _source:'live',
          _partialLive: endpointWarnings.length > 0,
          _liveWarnings: endpointWarnings
        };
      }

      async function fetchWithRetry(stock, key) {
        let lastErr = null;
        const controller = addController(new AbortController());
        const signal = controller.signal;
        try {
          for (let i = 0; i <= MAX_RETRIES; i++) {
            try {
              return await fetchStock(stock, key, signal);
            } catch (err) {
              lastErr = err;
              if (err && err.name === 'AbortError') throw err;

              const normalized = normalizeErrorText(err && err.message || err);
              const classification = classifyRuntimeError(normalized);

              // Auth-Fehler sind nicht recoverable im Client.
              if (classification.code === 'auth') throw err;

              let retryDelay = RETRY_DELAY_MS * (i + 1);
              if (classification.code === 'html') {
                retryDelay = HTML_RETRY_DELAYS_MS[Math.min(i, HTML_RETRY_DELAYS_MS.length - 1)];
              } else if (classification.code === 'rate') {
                retryDelay = RATE_LIMIT_RETRY_DELAYS_MS[Math.min(i, RATE_LIMIT_RETRY_DELAYS_MS.length - 1)];
              } else if (classification.code === 'network') {
                retryDelay = NETWORK_RETRY_DELAYS_MS[Math.min(i, NETWORK_RETRY_DELAYS_MS.length - 1)];
              }

              if (i < MAX_RETRIES) {
                await sleep(retryDelay);
                continue;
              }
            }
          }

          const fallback = STATIC_STOCK_DATA.find(s => s.ticker === stock.ticker);
          if (fallback) {
            const fallbackReason = normalizeErrorText(lastErr ? String(lastErr.message || lastErr) : 'unbekannt');
            return Object.assign({}, fallback, {
              _source:'fallback',
              _fallbackError:fallbackReason,
              _fallbackType: classifyRuntimeError(fallbackReason).code
            });
          }
          throw lastErr || new Error('Unbekannter Finnhub-Fehler');
        } finally {
          removeController(controller);
        }
      }

      function abortAll() {
        controllers.forEach(ctrl => { try { ctrl.abort(); } catch {} });
        controllers.clear();
      }
      return { fetchWithRetry, abortAll };
    })();

    const state = {
      mode:'static',
      apiKey:'',
      count:Math.min(25, STATIC_STOCK_DATA.length),
      running:false,
      results:[],
      errors:[],
      logs:[],
      progress:0,
      curTicker:'',
      done:false,
      activeTab:'scanner',
      regionFilter:'Alle',
      expandedTicker:null,
      reportSort:'score',
      reportFilter:'ALLE',
      stopRequested:false,
      analysisToken:0,
      lastRunMode:'static'
    };

    let renderQueued = false;
    function setState(patch){ Object.assign(state, patch); queueRender(); }
    function queueRender(){ if(renderQueued) return; renderQueued = true; requestAnimationFrame(() => { renderQueued = false; render(); }); }
    function appendLog(entry){ state.logs = [entry, ...state.logs].slice(0, 250); queueRender(); }
    function enrichStatic(stock, source='static'){ return Object.assign({}, stock, calcScore(stock, stock.sector), { _source:source }); }

    function buildLogEntry(stock, source, extra = {}) {
      const errorText = normalizeErrorText(extra.error || '');
      const classification = classifyRuntimeError(errorText);
      return {
        ts: new Date().toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit' }),
        ticker: stock.ticker,
        name: stock.name,
        source,
        message: extra.warning && source === 'live' ? 'Daten weitgehend aus Finnhub geladen; optionale Endpoints wurden übersprungen.' : source === 'live' ? 'Daten erfolgreich aus Finnhub geladen.' : source === 'fallback' ? 'Finnhub fehlgeschlagen, statische Fallback-Daten verwendet.' : 'Statischer Modus – lokale Datenbasis verwendet.',
        error: errorText,
        score: extra.score ?? null,
        warning: extra.warning || '',
        reasonCode: extra.reasonCode || classification.code,
        reasonLabel: extra.reasonLabel || classification.label
      };
    }

    function runStatic(){
      const maxN = Math.min(state.count, STATIC_STOCK_DATA.length);
      const data = STATIC_STOCK_DATA.slice(0, maxN).map(s => enrichStatic(s, 'static'));
      const logs = data.map(s => buildLogEntry(s, 'static', { score:s.totalScore })).reverse();
      setState({ results:data, errors:[], logs, progress:100, done:true, running:false, curTicker:'', lastRunMode:'static' });
    }

    async function runFinnhub(){
      const key = state.apiKey.trim();
      if(!key || state.running) return;
      const token = Date.now();
      setState({ running:true, done:false, results:[], errors:[], logs:[], progress:0, curTicker:'', stopRequested:false, analysisToken:token, lastRunMode:'finnhub' });
      const batch = STATIC_STOCK_DATA.slice(0, Math.min(state.count, STATIC_STOCK_DATA.length));
      const results = [];
      const errors = [];
      let completed = 0;
      for(let i=0; i<batch.length; i+=CONCURRENCY){
        if(state.stopRequested || state.analysisToken !== token) break;
        const chunk = batch.slice(i, i + CONCURRENCY);
        setState({ curTicker: chunk.map(s => s.ticker).join(', ') });
        const settled = await Promise.allSettled(chunk.map(async stock => {
          const raw = await FinnhubService.fetchWithRetry(stock, key);
          return Object.assign({}, stock, raw, calcScore(raw, stock.sector));
        }));
        const batchResults = [];
        const batchErrors = [];
        settled.forEach((entry, idx) => {
          const stock = chunk[idx];
          if(entry.status === 'fulfilled'){
            batchResults.push(entry.value);
            appendLog(buildLogEntry(stock, entry.value._source || 'live', { error: entry.value._fallbackError || '', score: entry.value.totalScore, reasonCode: entry.value._fallbackType || classifyRuntimeError(entry.value._fallbackError || '').code }));
          } else if (!(entry.reason && entry.reason.name === 'AbortError')) {
            batchErrors.push(Object.assign({}, stock, { error: entry.reason?.message || 'Fehler' }));
            appendLog(buildLogEntry(stock, 'fallback', { error: entry.reason?.message || 'Fehler', score:null, reasonCode: classifyRuntimeError(entry.reason?.message || 'Fehler').code }));
          }
        });
        completed += chunk.length;
        results.push(...batchResults);
        errors.push(...batchErrors);
        setState({ results:results.slice(), errors:errors.slice(), progress:Math.round(completed / batch.length * 100) });
        if(state.stopRequested || state.analysisToken !== token) break;
        if(i + CONCURRENCY < batch.length) await sleep(BATCH_DELAY_MS);
      }
      setState({ running:false, done:true, curTicker:'', progress:state.stopRequested ? state.progress : 100 });
    }

    function stopAnalysis(){
      state.stopRequested = true;
      FinnhubService.abortAll();
      appendLog({ ts:new Date().toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit' }), ticker:'—', name:'Analyse gestoppt', source:'static', message:'Lauf durch Benutzer beendet.', error:'', score:null });

    function getSummary(){
      const results = state.results;
      const live = results.filter(r => (r._source || 'static') === 'live').length;
      const fallback = results.filter(r => (r._source || 'static') === 'fallback').length;
      const statisch = Math.max(0, results.length - live - fallback);
      const average = results.length ? (results.reduce((sum, r) => sum + (r.totalScore || 0), 0) / results.length).toFixed(1) : '—';
      const best = results.slice().sort((a,b) => b.totalScore - a.totalScore || a.name.localeCompare(b.name, 'de'))[0] || null;
      return { live, fallback, statisch, average, best };
    }

                <span class="rank ${index < 3 ? 'top' : ''}">${index + 1}</span>
                <div>
                  <div class="name-main"><span style="font-size:12px">${escapeHtml(stock.region)}</span><span>${escapeHtml(stock.name)}</span>${renderSourceBadge(stock._source || 'static')}</div>
                  <div class="name-sub">${escapeHtml(stock.ticker)} · ${escapeHtml(stock.sector)}</div>
                </div>
                <div style="text-align:center"><span class="wkn-pill ${WKN[stock.ticker] ? 'has' : 'none'}">${escapeHtml(WKN[stock.ticker] || '—')}</span></div>
                <div style="text-align:center"><span class="score-value ${scoreClass(stock.totalScore)}">${fmtScore(stock.totalScore)}</span><div style="padding:0 6px">${renderScoreBar(stock.totalScore)}</div>${renderDots(stock.criteria)}</div>
                <div style="text-align:center"><span class="mono ${dataClass(stock.dataCompleteness || 0)}" style="font-size:10px;font-weight:700">${stock.dataCompleteness || 0}%</span></div>
                <div style="text-align:center">${ok(stock.currentPrice) ? `<div><span class="mono" style="font-size:12px;font-weight:700">${Number(stock.currentPrice).toFixed(2)}</span><div style="font-size:9px;color:var(--muted)">${escapeHtml(stock.currency || '')}</div></div>` : '<span style="color:var(--muted);font-size:11px">—</span>'}</div>
                <div style="text-align:center">${renderBadge(stock.recommendation)}</div>
              </div>
            `).join('')}
            <div class="footer-note">${sorted.length} Aktien · ${new Date().toLocaleDateString('de-DE')} · Version ${APP_VERSION} · Keine Anlageberatung · WKN ohne Gewähr</div>
          </div>
        </section>
      `;
    }

    function render(){
      const root = $('app');
      const active = document.activeElement;
      const activeId = active && active.id ? active.id : null;
      const selectionStart = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;
      const selectionEnd = active && typeof active.selectionEnd === 'number' ? active.selectionEnd : null;
      root.innerHTML = `
        <div class="app">
          <header class="topbar glass">
            <div class="shell topbar-inner">
              <div class="eyebrow"><span class="eyebrow-dot"></span><span class="eyebrow-text">MSCI ACWI · Levermann iOS Edition</span></div>
              <div class="headline">Top-30 <span class="accent">Screening</span></div>
              <div class="subtitle">${STATIC_STOCK_DATA.length} Aktien · Deterministisches Scoring · statisch + Finnhub Live · Apple-/iOS-inspirierte Oberfläche mit Quellen-Log und Score-Drilldown · ${APP_VERSION}</div>
              <div class="quick-badges">
                <span class="quick-badge"> inspiriertes UI</span>
                <span class="quick-badge">🪵 Quellen-Log</span>
                <span class="quick-badge">📈 Score-Drilldown</span>
                <span class="quick-badge">Version ${APP_VERSION}</span>
                <span class="quick-badge">${ARCH_PROFILE}</span>
              </div>
            </div>
          </header>
          <nav class="tabbar">
            <div class="shell tabs-wrap glass">
              <div class="tabs">
                ${[
                  { id:'scanner', label:'⚡ Scanner' },
                  { id:'report', label:`📋 Ergebnisse${state.results.length ? ` (${state.results.length})` : ''}` }
                ].map(tab => `<button class="tab-btn ${state.activeTab === tab.id ? 'active' : ''}" data-action="set-tab" data-tab="${escapeHtml(tab.id)}">${tab.label}</button>`).join('')}
              </div>
            </div>
          </nav>
          <main class="shell main">${state.activeTab === 'scanner' ? renderScannerTab() : renderReportTab()}</main>
        </div>
      `;
      const apiInput = $('apiKeyInput');
      if(apiInput && apiInput.value !== state.apiKey) apiInput.value = state.apiKey;
      const countInput = $('countInput');
      if(countInput && Number(countInput.value) !== state.count) countInput.value = String(state.count);
      if(activeId){
        const next = $(activeId);
        if(next){
          next.focus({ preventScroll:true });
          if(selectionStart !== null && selectionEnd !== null && typeof next.setSelectionRange === 'function'){
            try { next.setSelectionRange(selectionStart, selectionEnd); } catch {}
          }
        }
      }
    }

    document.addEventListener('click', (event) => {
      const el = event.target.closest('[data-action]');
      if(!el) return;
      const action = el.getAttribute('data-action');
      if(action === 'set-tab') return setState({ activeTab: el.getAttribute('data-tab') || 'scanner' });
      if(action === 'set-mode') return setState({ mode: el.getAttribute('data-mode') || 'static' });
      if(action === 'set-count') return setState({ count: Number(el.getAttribute('data-value') || state.count) });
      if(action === 'set-region') return setState({ regionFilter: el.getAttribute('data-region') || 'Alle' });
      if(action === 'toggle-expand'){
        const ticker = el.getAttribute('data-ticker');
        return setState({ expandedTicker: state.expandedTicker === ticker ? null : ticker });
      }
      if(action === 'run-analysis') return (state.mode === 'static' ? runStatic() : runFinnhub());
      if(action === 'stop-analysis') return stopAnalysis();
      if(action === 'report-filter') return setState({ reportFilter: el.getAttribute('data-value') || 'ALLE' });
      if(action === 'report-sort') return setState({ reportSort: el.getAttribute('data-value') || 'score' });
      if(action === 'export-csv'){
        const filtered = state.results.filter(r => state.reportFilter === 'ALLE' || r.recommendation === state.reportFilter);
        const sorted = filtered.slice().sort((a,b) => {
          if(state.reportSort === 'name') return a.name.localeCompare(b.name, 'de');
          if(state.reportSort === 'rating') return recommendationIndex(a.recommendation) - recommendationIndex(b.recommendation);
          return b.totalScore - a.totalScore || a.name.localeCompare(b.name, 'de');
        });
        const header = ['Rang','Name','WKN','Ticker','Region','Sektor','Score','Rating','Daten%','Kurs','Währung','Quelle'];
        const rows = sorted.map((s, i) => [i + 1, s.name, WKN[s.ticker] || '—', s.ticker, s.region, s.sector, fmtScore(s.totalScore), s.recommendation, `${s.dataCompleteness || 0}%`, ok(s.currentPrice) ? Number(s.currentPrice).toFixed(2) : '—', s.currency || '—', sourceLabel(s._source || 'static')]);
        return exportCSV([header, ...rows], `levermann_ios_${new Date().toISOString().slice(0, 10)}.csv`);
      }
    });

    document.addEventListener('input', (event) => {
      const target = event.target;
      if(target && target.id === 'apiKeyInput') return setState({ apiKey: target.value });
      if(target && target.id === 'countInput') return setState({ count: Number(target.value || state.count) });
    });

    window.addEventListener('beforeunload', () => FinnhubService.abortAll());
    render();
  </script>
</body>
</html>
